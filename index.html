<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Book: Prinsip Transparansi Syariah</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f6f9;
        }
        header {
            background-color: #0d233a;
            color: #d4af37;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .logo {
            font-size: 1.2rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .nav-container {
            position: relative;
            display: inline-block;
        }
        .dropbtn {
            background-color: #d4af37;
            color: #0d233a;
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            border-radius: 4px;
        }
        .dropdown-content {
            display: none;
            position: absolute;
            right: 0;
            background-color: #ffffff;
            min-width: 280px;
            box-shadow: 0px 8px 16px rgba(0,0,0,0.2);
            z-index: 1;
            border-radius: 4px;
            overflow: hidden;
        }
        .dropdown-content a {
            color: #333;
            padding: 12px 16px;
            text-decoration: none;
            display: block;
            font-size: 14px;
            border-bottom: 1px solid #f0f0f0;
        }
        .dropdown-content a.heading1 {
            background-color: #f7f9fa;
            font-weight: bold;
            color: #0d233a;
            padding-left: 12px;
        }
        .dropdown-content a.heading2 {
            padding-left: 25px;
        }
        .dropdown-content a:hover {
            background-color: #0d233a;
            color: #ffffff;
        }
        .show {
            display: block;
        }
        .iframe-container {
            width: 100%;
            height: calc(100vh - 75px);
            border: none;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">E-Book Muamalah Kontemporer</div>
        <div class="nav-container">
            <button onclick="toggleMenu()" class="dropbtn">Daftar Isi ☰</button>
            <div id="myDropdown" class="dropdown-content">
                <a href="cover.html" target="contentFrame" onclick="toggleMenu()">Halaman Depan (Cover)</a>
                <a href="kata_pengantar.html" target="contentFrame" onclick="toggleMenu()">Kata Pengantar</a>
                
                <a class="heading1">BAB 1: Pengertian & Urgensi</a>
                <a href="bab1.html" class="heading2" target="contentFrame" onclick="toggleMenu()">A. Pengertian dan Urgensi Jual Beli</a>
                
                <a class="heading1">BAB 2: Prinsip Pokok</a>
                <a href="bab2.html" class="heading2" target="contentFrame" onclick="toggleMenu()">B. Prinsip-prinsip Pokok dalam Jual Beli</a>
                
                <a class="heading1">BAB 3: Larangan & Anjuran</a>
                <a href="bab3.html" class="heading2" target="contentFrame" onclick="toggleMenu()">C. Larangan dan Anjuran Jual Beli</a>
                
                <a href="daftar_pustaka.html" target="contentFrame" onclick="toggleMenu()">Daftar Pustaka</a>
                <a href="profil.html" target="contentFrame" onclick="toggleMenu()">Profil Penulis & Editor</a>
            </div>
        </div>
    </header>

    <div class="iframe-container">
        <iframe src="cover.html" name="contentFrame"></iframe>
    </div>

    <script>
        function toggleMenu() {
            document.getElementById("myDropdown").classList.toggle("show");
        }
        window.onclick = function(event) {
            if (!event.target.matches('.dropbtn')) {
                var dropdowns = document.getElementsByClassName("dropdown-content");
                for (var i = 0; i < dropdowns.length; i++) {
                    var openDropdown = dropdowns[i];
                    if (openDropdown.classList.contains('show')) {
                        openDropdown.classList.remove('show');
                    }
                }
            }
        }
    </script>
</body>
</html>
